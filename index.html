<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل مع محمد عبده الردفاني</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="text"],
        textarea {
            width: 90%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box; 
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            width: 100%;
        }
        button:hover {
            background-color: #218838;
        }
        
        #success-message {
            display: none;
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        
        #error-message {
            display: none;
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>أرسل رسالة إلى محمد عبده الردفاني</h2>
        
        <form id="contact-form" action="https://formspree.io/f/xvzdoqvw" method="POST">
            
            <input type="text" name="name" placeholder="الاسم الكريم (اختياري)" />
            
            <textarea name="message" id="message-input" placeholder="اكتب رسالتك هنا..." required></textarea>
            
            <button type="submit" id="submit-button">إرسال الرسالة</button>
        </form>

        <div id="success-message">تم إرسال الرسالة بنجاح! شكراً لتواصلك.</div>
        <div id="error-message">عذراً، حدث خطأ أثناء الإرسال. يرجى المحاولة مرة أخرى.</div>
    </div>

    <script>
        var form = document.getElementById("contact-form");
        var successMessage = document.getElementById("success-message");
        var errorMessage = document.getElementById("error-message");
        var submitButton = document.getElementById("submit-button");

        form.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            
            submitButton.innerHTML = "جاري الإرسال...";
            submitButton.disabled = true;

            var data = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    form.style.display = "none"; 
                    successMessage.style.display = "block"; 
                } else {
                    errorMessage.style.display = "block";
                    submitButton.innerHTML = "إرسال الرسالة";
                    submitButton.disabled = false;
                }
            } catch (error) {
                errorMessage.style.display = "block";
                submitButton.innerHTML = "إرسال الرسالة";
                submitButton.disabled = false;
            }
        });
    </script>

</body>
</html>
